name: Setup Pages Branch Policy

on:
  push:
    branches: ["claude/job-search-app-spec-VVbmm"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Add branch policy for claude branches
        run: |
          # Add wildcard policy for claude/* branches
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/environments/github-pages/deployment-branch-policies" \
            -d '{"name":"claude/*","type":"branch"}'
          echo "Branch policy added"
